name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          GOBIN="${RUNNER_TEMP}/bin" go install github.com/zricethezav/gitleaks/v8@v8.30.1
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"

      - name: Run Gitleaks
        run: |
          set -euo pipefail
          gitleaks detect --source . --redact --no-banner --verbose

  repo-secret-patterns:
    name: Repository secret pattern guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan high-risk committed-secret patterns
        run: |
          set -euo pipefail
          if test -f Rivulet/Config/Secrets.swift; then
            echo "Rivulet/Config/Secrets.swift must remain local and ignored."
            exit 1
          fi

          if grep -RInE "https://[A-Za-z0-9]+@[A-Za-z0-9.-]*sentry\.io|sk-[A-Za-z0-9_-]{20,}|xox[baprs]-[A-Za-z0-9-]{20,}|AKIA[0-9A-Z]{16}" \
            --exclude-dir=.git \
            --exclude='*.xcprivacy' \
            --exclude='Secrets.swift.template' \
            .; then
            echo "Potential committed secret found."
            exit 1
          fi
