name: Claude Code Review

# Uses `pull_request` rather than `pull_request_target` because Anthropic's
# OIDC token-exchange endpoint currently rejects `pull_request_target` events
# (anthropics/claude-code-action#713). Trade-off: fork PRs won't get
# auto-reviewed — they can still be reviewed on demand by commenting `@claude`,
# which is handled by claude.yml via `issue_comment`.
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    if: |
      github.event.pull_request.user.login == 'l984-451' ||
      github.event.pull_request.user.login == 'rrgomes'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
